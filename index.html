<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta de Medios — RIS 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F5F5;
    --black:#1A1A1A;
    --yellow:#FFC000;
    --white:#FFFFFF;
    --t1:#1A1A1A;
    --t2:#333333;
    --t3:#999999;
    --t4:#666666;
    --graybar:#888888;
    --green:#4CAF50;
    --red:#EF5350;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:#0d0d0d;
    font-family:'Poppins', sans-serif;
    color:var(--t1);
    scroll-behavior:smooth;
  }
  .deck{
    max-width:1200px;
    margin:0 auto;
    padding:36px 0 100px;
  }
  .slide{
    background:var(--bg);
    width:100%;
    aspect-ratio:16/9;
    border-radius:14px;
    position:relative;
    margin-bottom:28px;
    padding:26px 30px 24px;
    box-shadow:0 18px 40px rgba(0,0,0,0.35);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .slide.dark{ background:var(--black); }

  /* Header bar */
  .header{
    background:var(--black);
    border-radius:14px;
    height:11%;
    min-height:44px;
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:14px;
    flex-shrink:0;
  }
  .header img{
    height:62%;
    aspect-ratio:1/1;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
  }
  .header .htitle{
    color:#fff;
    font-size:clamp(13px,1.6vw,19px);
    line-height:1.25;
  }
  .header .htitle b{ font-weight:700; }
  .header .htitle i{ font-style:italic; font-weight:700; }
  .header .tag{
    margin-left:auto;
    background:var(--yellow);
    color:var(--black);
    font-weight:700;
    font-size:clamp(9px,1vw,12px);
    padding:5px 12px;
    border-radius:20px;
    white-space:nowrap;
  }

  .subtitle{
    font-size:clamp(10px,1.05vw,13px);
    color:var(--t4);
    font-style:italic;
    font-weight:300;
    margin:10px 2px 2px;
  }

  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:10px;
    min-height:0;
  }

  /* Cards */
  .card{
    background:var(--white);
    border:0.5px solid #E0E0E0;
    border-radius:10px;
    position:relative;
    overflow:hidden;
    padding:14px 14px 16px;
  }
  .card.bar-bottom::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:6px;
    background:var(--yellow);
  }
  .card.bar-left::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:6px;
    background:var(--yellow);
  }

  /* KPI row */
  .kpi-row{
    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:1fr;
    gap:12px;
  }
  .kpi{
    text-align:center;
    padding:14px 8px 16px;
  }
  .kpi .num{
    font-size:clamp(18px,2.6vw,30px);
    font-weight:700;
    color:var(--t1);
  }
  .kpi .lbl{
    font-size:clamp(8px,0.95vw,11px);
    font-weight:700;
    color:var(--t2);
    margin-top:6px;
    text-transform:uppercase;
    letter-spacing:.02em;
  }
  .kpi .sub{
    font-size:clamp(7px,0.8vw,9.5px);
    color:var(--t3);
    margin-top:4px;
    font-weight:300;
  }

  /* two column layout */
  .cols{
    display:grid;
    grid-template-columns:1.15fr 0.85fr;
    gap:14px;
    flex:1;
    min-height:0;
  }
  .cols.reverse{ grid-template-columns:0.85fr 1.15fr; }

  .panel-title{
    font-size:clamp(10px,1.1vw,13.5px);
    font-weight:700;
    color:var(--t1);
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel-title .dot{
    width:8px;height:8px;border-radius:50%;background:var(--yellow);
    flex-shrink:0;
  }

  ul.bullets{ list-style:none; }
  ul.bullets li{
    font-size:clamp(9px,1.0vw,12px);
    color:var(--t4);
    font-weight:300;
    line-height:1.5;
    padding-left:16px;
    position:relative;
    margin-bottom:7px;
  }
  ul.bullets li::before{
    content:"›";
    position:absolute; left:0; top:-1px;
    color:var(--yellow);
    font-weight:700;
    font-size:1.1em;
  }
  ul.bullets li b{ color:var(--t2); font-weight:700; }

  /* table */
  table.cmp{
    width:100%;
    border-collapse:collapse;
    font-size:clamp(8px,0.95vw,11px);
  }
  table.cmp th{
    background:var(--black);
    color:#fff;
    font-weight:700;
    padding:7px 8px;
    text-align:left;
  }
  table.cmp td{
    padding:6px 8px;
    border-bottom:0.5px solid #DDDDDD;
    color:var(--t2);
    font-weight:400;
  }
  table.cmp tr:nth-child(even) td{ background:#F9F9F9; }
  table.cmp td.highlight, table.cmp th.highlight{
    background:var(--yellow) !important;
    color:var(--black) !important;
    font-weight:700;
  }
  table.cmp td.gray{ background:#E8E8E8; color:var(--t2); }
  table.cmp td.green{ color:var(--green); font-weight:700; }

  /* insight bar */
  .insight{
    background:var(--white);
    border:0.5px solid #E0E0E0;
    border-radius:8px;
    padding:9px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
    padding-left:20px;
  }
  .insight::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:6px;
    background:var(--yellow);
    border-radius:8px 0 0 8px;
  }
  .insight p{
    font-size:clamp(8px,0.92vw,11px);
    color:var(--t4);
    font-weight:300;
  }
  .insight p b{ color:var(--t2); font-weight:700; }

  /* journey */
  .journey{
    display:flex;
    align-items:stretch;
    gap:10px;
    flex:1;
    min-height:0;
  }
  .jstep{
    flex:1;
    background:var(--white);
    border:0.5px solid #E0E0E0;
    border-radius:10px;
    padding:14px 12px 16px;
    position:relative;
    display:flex;
    flex-direction:column;
    text-align:center;
  }
  .jstep::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:6px;
    background:var(--yellow);
  }
  .jstep .circ{
    width:26px;height:26px;border-radius:50%;
    background:var(--black); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:12px;
    margin:0 auto 8px;
  }
  .jstep.final .circ{ background:var(--yellow); color:var(--black); }
  .jstep h4{
    font-size:clamp(9px,1.0vw,12px);
    font-weight:700; color:var(--t2); margin-bottom:5px;
  }
  .jstep p{
    font-size:clamp(7.5px,0.85vw,10px);
    color:var(--t4); font-weight:300; line-height:1.4;
  }
  .arrow{
    display:flex; align-items:center; justify-content:center;
    color:var(--yellow); font-size:22px; font-weight:700;
    flex:0 0 18px;
  }

  /* dark slide */
  .dark-hero{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:center;
    padding:0 4%;
  }
  .dark-hero .kicker{
    color:var(--yellow);
    font-weight:700;
    font-size:clamp(9px,1vw,12px);
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .dark-hero h1{
    color:#fff;
    font-size:clamp(24px,4.2vw,46px);
    font-weight:800;
    line-height:1.12;
    max-width:90%;
  }
  .dark-hero h1 i{ color:var(--yellow); font-style:italic; }
  .dark-hero .desc{
    color:#bbb;
    font-weight:300;
    font-style:italic;
    font-size:clamp(11px,1.2vw,15px);
    margin-top:16px;
    max-width:70%;
  }
  .dark-hero .foot{
    position:absolute;
    bottom:20px; left:4%;
    color:#666;
    font-size:clamp(8px,0.85vw,10.5px);
    font-weight:300;
  }
  .dark-hero .logowrap{
    position:absolute; top:26px; right:30px;
    display:flex; align-items:center; gap:10px;
  }
  .dark-hero .logowrap img{
    height:34px; width:34px; border-radius:50%;
    object-fit:cover;
  }

  /* badges */
  .badge-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
  .badge{
    background:rgba(255,192,0,0.12);
    border:1px solid rgba(255,192,0,0.4);
    color:var(--yellow);
    font-size:clamp(8px,0.85vw,10.5px);
    font-weight:600;
    padding:5px 12px;
    border-radius:20px;
  }

  .slide-index{
    position:absolute;
    bottom:10px; right:16px;
    font-size:9px;
    color:var(--t3);
    font-weight:600;
  }
  .dark .slide-index{ color:#555; }

  .stat-strip{
    display:flex;
    gap:12px;
  }
  .stat-box{
    flex:1;
    background:var(--white);
    border:0.5px solid #E0E0E0;
    border-radius:10px;
    padding:12px 12px 14px;
    position:relative;
  }
  .stat-box::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:6px;
    background:var(--yellow);
  }
  .stat-box .n{
    font-size:clamp(17px,2.2vw,26px);
    font-weight:800; color:var(--t1);
  }
  .stat-box .l{
    font-size:clamp(8px,0.85vw,10px);
    color:var(--t2); font-weight:700; margin-top:4px;
  }
  .stat-box .s{
    font-size:clamp(7px,0.75vw,9px);
    color:var(--t3); font-weight:300; margin-top:3px;
  }
  .stat-box.pos .n{ color:var(--green); }

  .flow-table td, .flow-table th{ text-align:center; }

  .goal-card{
    background:var(--white);
    border:0.5px solid #E0E0E0;
    border-radius:10px;
    padding:12px 14px 14px;
    position:relative;
    overflow:hidden;
  }
  .goal-card::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:6px;
    background:var(--yellow);
  }
  .goal-card .glabel{
    font-size:clamp(9px,1vw,12px);
    font-weight:700; color:var(--t2);
    margin-bottom:4px;
  }
  .goal-card .gvalues{
    font-size:clamp(15px,2vw,22px);
    font-weight:800; color:var(--t1);
    margin-bottom:2px;
  }
  .goal-card .gvalues .of-target{
    font-size:0.42em; font-weight:400; color:var(--t3);
  }
  .goal-bar-track{
    width:100%; height:7px; border-radius:5px;
    background:#EDEDED; margin:8px 0 6px; overflow:hidden;
  }
  .goal-bar-fill{ height:100%; border-radius:5px; background:var(--black); }
  .goal-bar-fill.good{ background:var(--green); }
  .goal-bar-fill.bad{ background:var(--red); }
  .goal-foot{
    display:flex; justify-content:space-between; align-items:center;
    font-size:clamp(7.5px,0.85vw,9.5px); color:var(--t3); font-weight:600;
  }
  .goal-foot .pct.good{ color:var(--green); }
  .goal-foot .pct.bad{ color:var(--red); }
  .flow-table td:first-child, .flow-table th:first-child{ text-align:left; }

  .placeholder-box{
    border:2px dashed #CCCCCC;
    border-radius:10px;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:8px;
    background:#FCFCFC;
  }
  .placeholder-box span{
    font-size:clamp(11px,1.2vw,15px);
    color:var(--t3);
    font-weight:600;
  }
  .placeholder-box small{
    font-size:clamp(8px,0.9vw,10.5px);
    color:var(--t3);
    font-weight:300;
    max-width:60%;
    text-align:center;
  }

  @media print{
    body{ background:#fff; }
    .slide{ page-break-after:always; box-shadow:none; }
  }
</style>
</head>
